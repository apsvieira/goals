name: Android Build

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/android-build.yml'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Need full history so `git describe --tags` can find the latest tag
          fetch-depth: 0

      - name: Compute version from git
        id: version
        run: |
          set -euo pipefail
          TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || echo "v0.0.0")
          TAG_VERSION="${TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          if [ "$VERSION_CODE" -lt 1 ]; then VERSION_CODE=1; fi
          COMMITS_SINCE=$(git rev-list --count "${TAG}..HEAD" 2>/dev/null || echo 0)
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ "$COMMITS_SINCE" -gt 0 ]; then
            VERSION_NAME="${TAG_VERSION}-dev.${COMMITS_SINCE}+g${SHORT_SHA}"
          else
            VERSION_NAME="${TAG_VERSION}"
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Debug build derived versionName=$VERSION_NAME versionCode=$VERSION_CODE from tag=$TAG (+$COMMITS_SINCE commits)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: frontend/android

      - name: Decode google-services.json
        if: env.GOOGLE_SERVICES_JSON != ''
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > frontend/android/app/google-services.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug "-PversionName=${{ steps.version.outputs.version_name }}" "-PversionCode=${{ steps.version.outputs.version_code }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: frontend/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag does not match strict semver: v$TAG"
            exit 1
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG"
          if [ "$MINOR" -gt 99 ] || [ "$PATCH" -gt 99 ]; then
            echo "::error::Version components must be 0-99 (got $MAJOR.$MINOR.$PATCH)"
            exit 1
          fi
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Parsed tag v$TAG → versionName=$TAG, versionCode=$VERSION_CODE"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: frontend/android

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > frontend/tiny-tracker-upload.keystore

      - name: Create keystore.properties
        working-directory: frontend/android
        run: |
          cat > keystore.properties <<EOF
          storeFile=../../tiny-tracker-upload.keystore
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Create Play Publisher key
        run: echo '${{ secrets.PLAY_PUBLISHER_KEY }}' > frontend/play-publisher-key.json

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > frontend/android/app/google-services.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build release AAB
        working-directory: frontend/android
        run: ./gradlew bundleRelease "-PversionName=${{ steps.version.outputs.version_name }}" "-PversionCode=${{ steps.version.outputs.version_code }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Publish to internal track
        working-directory: frontend/android
        run: ./gradlew publishBundle "-PversionName=${{ steps.version.outputs.version_name }}" "-PversionCode=${{ steps.version.outputs.version_code }}"
